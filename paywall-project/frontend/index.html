<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Permissions-Policy" content="geolocation=(self)">
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Force light color scheme — prevents Samsung Internet and other browsers
         from auto-applying dark mode / night mode filters that shift the color palette -->
    <meta name="color-scheme" content="light" />
    <!-- Sets the browser chrome / address bar color on Android Chrome and Samsung Internet -->
    <meta name="theme-color" content="#7dbe9d" />
    <title>Austin Carter</title>
  </head>
  <body>
    <div id="app"></div>
    
    <script type="module" src="/src/main.js"></script>

    <!-- PayPal JS SDK — client-id is injected from the VITE_PAYPAL_CLIENT_ID env var at build time -->
    <script src="https://www.paypal.com/sdk/js?client-id=%VITE_PAYPAL_CLIENT_ID%&currency=%VITE_PAYPAL_CURRENCY%"></script>

  </body>
</html>
